server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name proforin.online www.proforin.online proforin.ru www.proforin.ru 31.76.76.176 2.26.231.32 _;

    client_max_body_size 2m;

    access_log /var/log/nginx/kliko-site.access.log;
    error_log /var/log/nginx/kliko-site.error.log warn;

    location /static/ {
        alias /srv/kliko-site/current/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /examples/primeri/ {
        alias /srv/kliko-site/current/examples/primeri/;
        try_files $uri $uri/ /examples/primeri/index.html;
    }

    location /examples/primeri-2/ {
        alias /srv/kliko-site/current/examples/primeri-2.0/;
        try_files $uri $uri/ /examples/primeri-2/index.html;
    }

    location ~ /\.(?!well-known/acme-challenge/) {
        return 404;
    }

    location ~* ^/(?:wp-admin|wp-login\.php|xmlrpc\.php|\.env|vendor/|composer\.(?:json|lock)|phpmyadmin|adminer) {
        return 444;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
