limit_req_zone $binary_remote_addr zone=proforin_general:10m rate=12r/s;
limit_req_zone $binary_remote_addr zone=proforin_forms:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=proforin_track:10m rate=45r/m;
limit_conn_zone $binary_remote_addr zone=proforin_conn:10m;

server {
    listen 80;
    listen [::]:80;
    server_name proforin.online www.proforin.online;

    location /.well-known/acme-challenge/ {
        root /var/www/proforin;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name proforin.online www.proforin.online;

    client_max_body_size 128k;
    client_body_buffer_size 16k;
    large_client_header_buffers 2 4k;
    limit_req_status 429;
    limit_conn_status 429;
    limit_conn proforin_conn 20;
    limit_req zone=proforin_general burst=30 nodelay;

    ssl_certificate /etc/letsencrypt/live/proforin.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proforin.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    access_log /var/log/nginx/proforin.access.log;
    error_log /var/log/nginx/proforin.error.log warn;

    location /static/ {
        alias /var/www/proforin/app/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\.(?!well-known/acme-challenge/) {
        return 404;
    }

    location ~* ^/(?:wp-admin|wp-login\.php|xmlrpc\.php|\.env|vendor/|composer\.(?:json|lock)|phpmyadmin|adminer) {
        return 444;
    }

    location = /lead/ {
        if ($request_method != POST) { return 405; }
        limit_req zone=proforin_forms burst=3 nodelay;
        proxy_pass http://unix:/run/proforin/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /contact-phone/ {
        if ($request_method != POST) { return 405; }
        limit_req zone=proforin_forms burst=2 nodelay;
        proxy_pass http://unix:/run/proforin/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /track/ {
        if ($request_method != POST) { return 405; }
        limit_req zone=proforin_track burst=20 nodelay;
        proxy_pass http://unix:/run/proforin/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://unix:/run/proforin/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
